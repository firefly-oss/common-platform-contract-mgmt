components:
  schemas:
    ContractTermDTO:
      type: object
      properties:
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        dateUpdated:
          type: string
          format: date-time
          readOnly: true
        contractTermId:
          type: integer
          format: int64
          readOnly: true
        contractId:
          type: integer
          format: int64
        termType:
          type: string
          enum:
            - INTEREST_RATE
            - CREDIT_LIMIT
            - FEE_SCHEDULE
            - PAYMENT_SCHEDULE
            - PENALTY_RATE
        termDescription:
          type: string
        numericValue:
          type: number
        valueUnit:
          type: string
        effectiveDate:
          type: string
          format: date-time
        expirationDate:
          type: string
          format: date-time
    ContractStatusHistoryDTO:
      type: object
      properties:
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        dateUpdated:
          type: string
          format: date-time
          readOnly: true
        contractStatusHistoryId:
          type: integer
          format: int64
          readOnly: true
        contractId:
          type: integer
          format: int64
        statusCode:
          type: string
          enum:
            - DRAFT
            - ACTIVE
            - DELINQUENT
            - DEFAULT
            - CLOSED
            - CANCELLED
        statusStartDate:
          type: string
          format: date-time
        statusEndDate:
          type: string
          format: date-time
    ContractRiskAssessmentDTO:
      type: object
      properties:
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        dateUpdated:
          type: string
          format: date-time
          readOnly: true
        contractRiskAssessmentId:
          type: integer
          format: int64
          readOnly: true
        contractId:
          type: integer
          format: int64
        riskScore:
          type: number
        riskLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
        assessmentDate:
          type: string
          format: date-time
        assessor:
          type: string
        notes:
          type: string
    ContractPartyDTO:
      type: object
      properties:
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        dateUpdated:
          type: string
          format: date-time
          readOnly: true
        contractPartyId:
          type: integer
          format: int64
          readOnly: true
        contractId:
          type: integer
          format: int64
        partyId:
          type: integer
          format: int64
        roleInContractId:
          type: integer
          format: int64
        dateJoined:
          type: string
          format: date-time
        dateLeft:
          type: string
          format: date-time
        active:
          type: boolean
    ContractEventDTO:
      type: object
      properties:
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        dateUpdated:
          type: string
          format: date-time
          readOnly: true
        contractEventId:
          type: integer
          format: int64
          readOnly: true
        contractId:
          type: integer
          format: int64
        eventType:
          type: string
          enum:
            - RENEWAL
            - AMENDMENT
            - CANCELLATION
            - SUSPENSION
            - REACTIVATION
            - TERMINATION
        eventDate:
          type: string
          format: date-time
        eventDescription:
          type: string
        documentManagerRef:
          type: string
    ContractDocumentDTO:
      type: object
      properties:
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        dateUpdated:
          type: string
          format: date-time
          readOnly: true
        contractDocumentId:
          type: integer
          format: int64
          readOnly: true
        contractId:
          type: integer
          format: int64
        documentType:
          type: string
        documentManagerRef:
          type: string
        dateAdded:
          type: string
          format: date-time
    ContractDTO:
      type: object
      properties:
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        dateUpdated:
          type: string
          format: date-time
          readOnly: true
        contractId:
          type: integer
          format: int64
          readOnly: true
        contractNumber:
          type: string
        productCatalogId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        contractStatus:
          type: string
          enum:
            - DRAFT
            - PENDING
            - ACTIVE
            - SUSPENDED
            - CLOSED
            - CANCELLED
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        documentManagerRef:
          type: string
    FilterOptions:
      type: object
      properties:
        caseInsensitiveStrings:
          type: boolean
        includeInheritedFields:
          type: boolean
      description: Filter options for customizing filter behavior
    FilterRequestContractDTO:
      required:
        - pagination
      type: object
      properties:
        filters:
          $ref: '#/components/schemas/ContractDTO'
        rangeFilters:
          $ref: '#/components/schemas/RangeFilter'
        pagination:
          $ref: '#/components/schemas/PaginationRequest'
        options:
          $ref: '#/components/schemas/FilterOptions'
      description: Generic filter request that includes both filter criteria and pagination
    PaginationRequest:
      type: object
      properties:
        pageNumber:
          type: integer
          description: The zero-based page number to retrieve.
          format: int32
          example: 0
          default: 0
        pageSize:
          type: integer
          description: The number of items per page.
          format: int32
          example: 10
          default: 10
        sortBy:
          type: string
          description: The field to sort the results by.
          example: name
        sortDirection:
          type: string
          description: The direction of sorting, either ASC or DESC.
          example: DESC
          default: DESC
      description: Represents a pagination request for retrieving paginated results, including page number, size, sort field, and direction.
    RangeFilter:
      type: object
      properties:
        ranges:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RangeObject'
          description: Map of field names to their range criteria
      description: Represents range filters for numeric fields
    RangeObject:
      type: object
      properties:
        from:
          type: object
          description: Start value of the range
        to:
          type: object
          description: End value of the range
      description: Represents a range with from and to values
    PaginationResponseContractDTO:
      type: object
      properties:
        content:
          type: array
          description: The list of items for the current page.
          items:
            $ref: '#/components/schemas/ContractDTO'
        totalElements:
          type: integer
          description: The total number of elements across all pages.
          format: int64
        totalPages:
          type: integer
          description: The total number of pages based on the data size and page size.
          format: int32
        currentPage:
          type: integer
          description: The current page number, typically zero-based.
          format: int32
      description: Represents a paginated response containing a list of items and pagination metadata.
    PaginationResponse:
      type: object
      properties:
        content:
          type: array
          description: The list of items for the current page.
          items:
            type: object
            description: The list of items for the current page.
        totalElements:
          type: integer
          description: The total number of elements across all pages.
          format: int64
        totalPages:
          type: integer
          description: The total number of pages based on the data size and page size.
          format: int32
        currentPage:
          type: integer
          description: The current page number, typically zero-based.
          format: int32
      description: Represents a paginated response containing a list of items and pagination metadata.
