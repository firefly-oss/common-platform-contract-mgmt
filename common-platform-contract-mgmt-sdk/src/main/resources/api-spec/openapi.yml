  /api/v1/contracts/{contractId}/terms:
    get:
      tags:
        - Contract Terms
      summary: Retrieve Contract Terms
      description: Retrieves a paginated list of terms for the specified contract.
      operationId: getAllTerms
      parameters:
        - name: contractId
          in: path
          description: Unique identifier of the contract
          required: true
          schema:
            type: integer
            format: int64
        - name: pageNumber
          in: query
          description: The zero-based page number to retrieve.
          required: false
          schema:
            type: string
            description: The zero-based page number to retrieve.
            example: 0
            default: '0'
          example: 0
        - name: pageSize
          in: query
          description: The number of items per page.
          required: false
          schema:
            type: string
            description: The number of items per page.
            example: 10
            default: '10'
          example: 10
        - name: sortBy
          in: query
          description: The field to sort the results by.
          required: false
          schema:
            type: string
            description: The field to sort the results by.
            example: name
          example: name
        - name: sortDirection
          in: query
          description: The direction of sorting, either ASC or DESC.
          required: false
          schema:
            type: string
            description: The direction of sorting, either ASC or DESC.
            example: DESC
            default: DESC
          example: DESC
      responses:
        '200':
          description: Successfully retrieved contract terms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationResponse'
        '404':
          description: No terms found for the specified contract
    post:
      tags:
        - Contract Terms
      summary: Create Contract Term
      description: Creates a new term for the specified contract.
      operationId: createTerm
      parameters:
