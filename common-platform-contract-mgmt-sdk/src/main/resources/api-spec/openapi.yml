openapi: 3.0.1
info:
  title: common-platform-contract-mgmt
  description: Contract Management Core Application
  contact:
    name: Firefly Software Solutions Inc
    email: dev@getfirefly.io
  version: 1.0.0
servers:
  - url: http://core.catalis.vc/contracts
    description: Development Environment
  - url: /
    description: Local Development Environment
tags:
  - name: Contract Events
    description: APIs for managing contract events
  - name: Contracts
    description: APIs for managing contract records
  - name: Contract Risk Assessments
    description: APIs for managing contract risk assessments
  - name: Contract Parties
    description: APIs for managing parties linked to a contract
  - name: Contract Documents
    description: APIs for managing contract documents
  - name: Contract Status History
    description: APIs for managing contract status changes over time
  - name: Contract Terms
    description: APIs for managing terms of a contract
paths:
  /api/v1/contracts/{contractId}/terms/{termId}:
    get:
      tags:
        - Contract Terms
      summary: Get Contract Term
      description: Retrieve a specific contract term by its unique identifier.
      operationId: getTerm
      parameters:
        - name: contractId
          in: path
          description: Unique identifier of the contract
          required: true
          schema:
            type: integer
            format: int64
        - name: termId
          in: path
          description: Unique identifier of the term
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully retrieved the contract term
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractTermDTO'
        '404':
          description: Contract term not found
    put:
      tags:
        - Contract Terms
      summary: Update Contract Term
      description: Update an existing contract term by its unique identifier.
      operationId: updateTerm
      parameters:
        - name: contractId
          in: path
          description: Unique identifier of the contract
          required: true
          schema:
            type: integer
            format: int64
        - name: termId
          in: path
          description: Unique identifier of the term to update
          required: true
          schema:
            type: integer
            format: int64
        - name: X-Idempotency-Key
          in: header
          description: Unique key for idempotent requests. If provided, ensures that identical requests with the same key will only be processed once.
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractTermDTO'
        required: true
      responses:
        '200':
          description: Contract term updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractTermDTO'
        '404':
          description: Contract term not found
    delete:
      tags:
        - Contract Terms
      summary: Delete Contract Term
      description: Remove an existing term from the contract by its unique identifier.
      operationId: deleteTerm
      parameters:
        - name: contractId
          in: path
          description: Unique identifier of the contract
          required: true
          schema:
            type: integer
            format: int64
        - name: termId
          in: path
          description: Unique identifier of the term to delete
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Term deleted successfully
        '404':
          description: Contract term not found
